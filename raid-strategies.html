<style>
  :root{
    --bg1: #eaf4ff; --bg2: #fff7e8; --bg: #eaf4ff; --card: #ffffff; --border: #e7edf5;
    --ink: #2d3142; --ink-muted: #6b7280; --ink-dim: #9aa3b2;
    --accent: #3d9dff; --accent-soft: #eaf4ff; --accent-dark: #2b7fd6;
  }
  [data-theme="dark"]{
    --bg1: #10131d; --bg2: #1a1424; --bg: #10131d; --card: #1c2030; --border: #323850;
    --ink: #eef1f7; --ink-muted: #a7afc0; --ink-dim: #767f96;
    --accent: #5aa9ff; --accent-soft: #232840; --accent-dark: #8cc7ff;
  }
  .theme-toggle{
    position:fixed; top:16px; right:16px; z-index:20;
    width:42px; height:42px; border-radius:50%;

  .theme-toggle:hover{ transform: translateY(-2px); }
  *{ box-sizing:border-box; }
  body{
    margin:0; background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%); color: var(--ink);

  .home-link{

  }

  header{ padding: 12px 24px 10px; text-align:center; }
  h1{
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size: 27px;
    margin: 0; color: var(--ink);
  }

  .top-nav-wrap{
    max-width: 1760px; margin: 70px auto 0; padding: 0 20px;
    display:grid; grid-template-columns: 1fr auto 1fr; align-items:center; gap:16px;
  }
  .top-nav-wrap .home-link{ justify-self:start; grid-column:1; }
  .top-nav-wrap .top-nav-row{ grid-column:2; }
  .top-nav-wrap .nav-spacer{ grid-column:3; }

    .top-nav-wrap{ grid-template-columns: 1fr; justify-items:center; gap:12px; }
    .top-nav-wrap .home-link{ justify-self:center; grid-column:1; }
    .top-nav-wrap .top-nav-row{ grid-column:1; }
    .top-nav-wrap .nav-spacer{ display:none; }

  .mini-nav-row{ display:flex; justify-content:center; margin-top:6px; }
  @media (min-width:761px){
    .mini-nav-row{ justify-content:flex-start; max-width:1760px; margin:6px auto 0; padding:0 20px; }

    font-weight:800; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em;

  .nav-dropdown{ position:relative; }
  .nav-dropdown-trigger{
    display:inline-flex; align-items:center; gap:5px;
    background: var(--card); border:2px solid var(--border); border-radius:999px;
    padding: 8px 14px; font-family:'Baloo 2', sans-serif; font-weight:700; font-size:12.5px;

  .nav-dropdown-trigger.has-current{ background: var(--accent); color:#fff; border-color: var(--accent); }

  .nav-dropdown-item.current{ background: var(--accent); color:#fff; }
  .top-nav-row{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }

    display:inline-flex; align-items:center; gap:5px;

    color: var(--ink-muted); text-decoration:none;
    transition: transform .12s ease, border-color .12s ease, color .12s ease;
  }
  .top-nav-link:hover{ transform: translateY(-2px); border-color: var(--accent); color: var(--accent-dark); }
  .top-nav-link.current{ background: var(--accent); color:#fff; border-color: var(--accent); }
  .container{ max-width: 800px; margin: 0 auto; padding: 20px 24px 45px; }

  .section-block{ margin-bottom: 40px; }
  .section-head{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .section-title{
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:20px; color: var(--ink);
  }
  .section-sub{
    font-family:'Nunito', sans-serif; font-size:11.5px; color: var(--ink-dim);
  }

  .entry{
    background: var(--card); border:2px solid var(--border); border-radius:16px;
    padding: 20px 22px; margin-bottom:14px;
    box-shadow: 0 1px 2px rgba(26,29,41,0.04);
    transition: box-shadow .15s, border-color .15s;
  }
  .entry:hover{ border-color: #d6d3fb; box-shadow: 0 6px 18px rgba(91,79,224,0.08); }

  .entry-head{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
  .entry-name{ font-family:'Baloo 2', sans-serif; font-weight:700; font-size:17.5px; }
  .entry-abbrev{
    font-family:'Nunito', sans-serif; font-size:11px; font-weight:600;
    color: var(--accent); background: var(--accent-soft); padding:3px 9px; border-radius:6px;
  }
  .entry-desc{ font-size:14.5px; line-height:1.65; color: var(--ink-muted); }

  .clip-row{ display:flex; align-items:center; gap:10px; margin-top:12px; flex-wrap:wrap; }
  .clip-toggle{
    display:inline-flex; align-items:center; gap:6px;
    background: var(--accent-soft); color: var(--accent-dark); border:none; border-radius:8px;
    padding: 8px 14px; font-family:'Nunito', sans-serif; font-weight:600; font-size:13px;
    cursor:pointer; transition: background .12s;
  }
  .clip-toggle:hover{ background:#e2ddfb; }
  [data-theme="dark"] .clip-toggle:hover{ background:#33305a; }
  [data-theme="dark"] .clip-external:hover{ background:#33305a; }
  .clip-toggle svg{ width:11px; height:11px; }
  .clip-fallback{
    font-size:12.5px; font-weight:600; color: var(--ink-dim); text-decoration:none;
  }
  .clip-fallback:hover{ color: var(--accent-dark); text-decoration:underline; }
  .clip-note{
    font-size:11.5px; color: var(--ink-dim); margin-top:8px; font-style:italic;
  }

  .clip-player{
    margin-top:14px; border-radius:10px; overflow:hidden; background:#000;
    position:relative; width:100%; max-width:480px; aspect-ratio:16/9; display:none;
  }
  .clip-player.open{ display:block; }
  .clip-player iframe{ width:100%; height:100%; border:none; }

  .clip-external{
    display:inline-flex; align-items:center; gap:6px; margin-top:12px;
    background: var(--accent-soft); color: var(--accent-dark); border-radius:8px; padding:8px 14px;
    font-weight:600; font-size:13px; text-decoration:none; transition: background .12s;

    text-align:center; padding: 24px; font-size:12px; color: var(--ink-dim);
    font-family:'Nunito', sans-serif; border-top: 1px solid var(--border);

</style>

<header>
  <h1>Raid Strategies</h1>
</header>

<div class="container" id="container"></div>

<footer>Terms are defined as used within this archive; abbreviations match those shown on raid cards.</footer>

<script>
const SECTIONS = [
  {
    title: "Major Strategies",
    sub: "The core techniques nearly every solo relies on",
    entries: [
      {name:"Catch Tank", abbr:"CT", desc:"Catch tanks intercept and absorb energy from a high-damaging charge move. The energy absorbed is used to return their own quick, high-damage charge move.", clip:"https://www.youtube.com/clip/Ugkxmpsr6bg1lxK1BQNV_zRULXLE2k7yOYvn"},
      {name:"Tick Perfect Cast", abbr:"TPC", desc:"Precisely timing the final tap — not spamming — just before a charge move cast. Successful TPC avoids the energy resolve DPS nerf; very hard to execute consistently.", clip:"https://www.youtube.com/shorts/Bh2j0pw8pN4"},
      {name:"Clean Exit", abbr:"Exit", desc:"Relobbying during a charge move's animation for maximum energy efficiency and time savings.", clip:"https://youtube.com/clip/Ugkx_Hj2O0JdNjlvtFKrjWbl5evIR5_XWmdR?si=EX33knctv_Iv0Gf-"},
      {name:"Rejoin", abbr:"Rejoin", desc:"A rejoin lasting 6.5–7 seconds, only utilizing potions to quickly re-enter the fight.", clip:"https://youtu.be/B6wbCjdpUL8?t=144"},
      {name:"Execute", abbr:"Execute", desc:"Executing a boss with a low animation-duration or low-cost charge move.", clip:"https://youtube.com/clip/UgkxE8y4C0-2XWwhoEJQyuRYVCJtszv0vnzn?si=sCK7P6n3dwRwe-wj"},
      {name:"Hot Swap", abbr:"HS", desc:"Switching to the next available attacker when the current attacker cannot reach another charge move.", clip:"https://youtu.be/B6wbCjdpUL8?t=144"},
      {name:"Recycle", abbr:"RCY", desc:"Reusing the same Main DPS Pokémon across multiple rejoins instead of a fresh one each time.", clip:""},
    ]
  },
  {
    title: "Advanced / Minor Strategies",
    sub: "Refinements layered on top of the core techniques",
    entries: [
      {name:"Hotswap Chain", abbr:"HS Chain", desc:"When a boss casts charge moves in rapid succession, forcing the user to Catch Tank from one attacker straight into the next in rapid succession. Heavily RNG-based, but the highest DPS cycle achievable in a raid.", clip:"https://youtube.com/clip/UgkxNtkPTLxVA3zbMC0LHi_8hTwoLDzF2Y2b?si=gVYu8c3y0sAPKTEQ"},
      {name:"Combo Charge Move", abbr:"CCM", desc:"Using a small charge move when the enemy charge move would otherwise overflow in energy. e.g. Necrozma Dusk Mane lowering energy with an Iron Head before tanking a full Earthquake if Sunsteel Strike can't be cast in time.", clip:"https://youtube.com/clip/UgkxUIYnvNy-A1hU9_Jtfv3dBgWoVvZAdsVC?si=Ke8zYd1QTb1sKgkb"},
      {name:"Charge Move Buffer", abbr:"Buffer", desc:"When swapping — mainly to perform a Catch Tank — you can immediately cast a charge move (if you have the energy for it) without a fast move first, by buffering a charged move from your active Pokémon.", clip:"https://www.youtube.com/shorts/BGvH4QG5APs"},
      {name:"Trailing Catch Tank", abbr:"Trailing CT", desc:"A 6th Pokémon used to catch trailing charge moves when nearing a rejoin. This trailing Pokémon uses low energy-cost moves (Breaking Swipe, Aura Sphere, etc.) to increase consistency.", clip:"https://youtu.be/oxeW2WnuRlQ?t=186"},
      {name:"Advanced Rejoin", abbr:"Fast Rejoin", desc:"A rejoin lasting 5.5 seconds. Upon exiting the raid, the user first swipes to their party and buffers the animation by tapping the heal bag. This interaction saves roughly 1.0 second on average.", clip:""},
      {name:"Charge Move Delay", abbr:"CM Delay", desc:"Used against bosses with 1-bar charge moves. Intentionally delaying 2-bar or 3-bar charge move casts to force out fast moves instead — usually giving the player 2 free fast moves.", clip:""},
      {name:"Substitute", abbr:"Sub", desc:"Primary DPSer moves to the 2nd slot from the 2nd cycle onwards to avoid rejoining into a lethal charge move. A substitute (usually a Catch Tank) is moved to the first slot.", clip:"https://youtu.be/K4BRljy1TdY?t=82"},
    ]
  },
  {
    title: "Expensive \u201CWhaling\u201D Strategies",
    sub: "High-investment techniques for pushing the hardest content",
    entries: [
      {name:"Double Battle Party", abbr:"DBP", desc:"Using two identical battle parties; reduces every other rejoin time by about 40%. It can also create ideal Recommended Rejoins, which is a one-time time save.", clip:""},
    ]
  },
];

function parseEmbed(url){
  if(!url) return null;
  if(url.includes("/clip/")) return {type:"external", url};
  const idMatch = url.match(/(?:youtu\.be\/|shorts\/|watch\?v=)([a-zA-Z0-9_-]{6,})/);
  if(!idMatch) return {type:"external", url};
  const tMatch = url.match(/[?&]t=(\d+)/);
  const start = tMatch ? `?start=${tMatch[1]}` : "";
  return {type:"iframe", src:`https://www.youtube.com/embed/${idMatch[1]}${start}`};
}

function clipHtml(clipUrl, uid){
  if(!clipUrl) return "";
  const embed = parseEmbed(clipUrl);
  if(embed.type === "iframe"){
    return `
    <div class="clip-row">
      <button class="clip-toggle" onclick="toggleClip('${uid}', this)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Play Clip
      </button>
      <a class="clip-fallback" href="${clipUrl}" target="_blank" rel="noopener">Open on YouTube ↗</a>
    </div>
    <div class="clip-player" id="player-${uid}"></div>`;
  }
  return `
  <a class="clip-external" href="${clipUrl}" target="_blank" rel="noopener">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    Watch Clip ↗
  </a>`;
}

const EMBEDS = {};

function entryHtml(e, sectionIdx, entryIdx){
  const uid = `${sectionIdx}-${entryIdx}`;
  const slug = e.name.toLowerCase().replace(/[^a-z0-9]+/g, "-");
  if(e.clip) EMBEDS[uid] = parseEmbed(e.clip);
  return `
  <div class="entry" id="strategy-${slug}">
    <div class="entry-head">
      <span class="entry-name">${e.name}</span>
      <span class="entry-abbrev">${e.abbr}</span>
    </div>
    <div class="entry-desc">${e.desc}</div>
    ${clipHtml(e.clip, uid)}
  </div>`;
}

function toggleClip(uid, btn){
  const container = document.getElementById(`player-${uid}`);
  const embed = EMBEDS[uid];
  const isOpen = container.classList.contains("open");
  if(isOpen){
    container.classList.remove("open");
    container.innerHTML = "";
    const existingNote = container.nextElementSibling;
    if(existingNote && existingNote.classList.contains("clip-note")) existingNote.remove();
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play Clip`;
  } else {
    container.innerHTML = `<iframe src="${embed.src}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    container.classList.add("open");
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg> Hide Clip`;
    const note = document.createElement("div");
    note.className = "clip-note";
    note.textContent = "If the player shows an error, the video owner has disabled embedding — use the link above instead.";
    container.after(note);
  }
}

const container = document.getElementById("container");
container.innerHTML = SECTIONS.map((sec, si) => `
  <div class="section-block">
    <div class="section-head">
      <span class="section-title">${sec.title}</span>
    </div>
    <div class="section-sub" style="margin-bottom:16px;">${sec.sub}</div>
    ${sec.entries.map((e,ei) => entryHtml(e, si, ei)).join("")}
  </div>
`).join("");

const themeToggle = document.getElementById("themeToggle");
function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
  try{ localStorage.setItem("raidArchiveTheme", theme); }catch(e){}
}
themeToggle.addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
  applyTheme(current === "dark" ? "light" : "dark");
});
let initialTheme = "light";
try{
  const saved = localStorage.getItem("raidArchiveTheme");
  if(saved){ initialTheme = saved; }
  else if(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches){ initialTheme = "dark"; }
}catch(e){}
applyTheme(initialTheme);

function toggleNavDropdown(e, panelId){
  e.stopPropagation();
  const panel = document.getElementById(panelId);
  if(!panel) return;
  const isOpen = panel.classList.contains("open");
  document.querySelectorAll(".nav-dropdown-panel.open").forEach(p => p.classList.remove("open"));
  if(!isOpen) panel.classList.add("open");
}
document.addEventListener("click", () => {
  document.querySelectorAll(".nav-dropdown-panel.open").forEach(p => p.classList.remove("open"));
});
</script>

</body>
