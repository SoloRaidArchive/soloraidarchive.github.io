    position:absolute; top:calc(100% + 8px); left:0; transform:none;

    padding: 8px 14px; font-weight:700; font-size:12.5px;
    color: var(--ink-muted); text-decoration:none;
    transition: transform .12s ease, border-color .12s ease, color .12s ease;

function parseCSVText(text){
  const rows = [];
  let row = [], cur = "", inQuotes = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){ if(text[i+1] === '"'){ cur += '"'; i++; } else inQuotes = false; }
      else cur += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(cur); cur = ""; }
      else if(c === '\n'){ row.push(cur); rows.push(row); row = []; cur = ""; }
      else if(c === '\r'){}
      else cur += c;
    }
  }
  if(cur !== "" || row.length){ row.push(cur); rows.push(row); }
  return rows;
}

function rowsToRaidsDyn(rows, archivePage, category, earlyOffset, partyOffset){
  const raids = [];
  for(const row of rows){
    if(row.length < 10) continue;
    const boss = (row[0 + earlyOffset] || "").trim();
    const tierRaw = (row[1 + earlyOffset] || "").trim();
    const tierMatch = tierRaw.match(/^([\d.]+)\s*⭐/);
    if(!boss || !tierMatch) continue;
    const tier = tierMatch[1];
    const bossFm = (row[3 + earlyOffset] || "").trim();
    const bossCm = (row[4 + earlyOffset] || "").trim();
    const weatherRaw = (row[5 + earlyOffset] || "").trim();
    const weather = (weatherRaw || "extreme").toLowerCase();
    const rawCategory = earlyOffset === 1 ? (row[0] || "").trim() : "";

    const AE_ICON = "https://cdn2.steamgriddb.com/icon_thumb/55e643e737da20b912037cce912305fb.png";
    const SHIELD_ICON = "https://static.wikia.nocookie.net/396c21d1-3e98-4c0d-8bb2-9150fda4ec41";
    let adventureEffect = "none";
    if(partyOffset !== -1){
      const aeCell = (row[6 + earlyOffset] || "").trim();
      if(aeCell === AE_ICON) adventureEffect = "blade";
      else if(aeCell === SHIELD_ICON) adventureEffect = "bash";
    }

    let vodIdx = -1;
    for(let i = 0; i < row.length; i++){
      if(row[i].trim() === "VOD" || row[i].trim() === "VOD*"){ vodIdx = i; break; }
    }

    const party = [];
    for(let i = 0; i < 6; i++){
      const base = 7 + partyOffset + 4*i;
      if(vodIdx !== -1 && base >= vodIdx) break;
      const name = (row[base] || "").trim();
      const role = (row[base+1] || "").trim();
      const pfast = (row[base+2] || "").trim();
      const pcharge = (row[base+3] || "").trim();
      if(name && role) party.push({ n: name, r: role, fast: pfast, charge: pcharge });
    }
    if(party.length === 0){
      for(let i = 0; i < row.length; i++){
        if(row[i].trim() === "Various"){
          for(let j = i+1; j < Math.min(i+4, row.length); j++){
            if(row[j].includes("Main DPS")){
              party.push({ n:"Various", r: row[j].trim(), fast:"", charge:"" });
              break;
            }
          }
          break;
        }
      }
    }
    if(party.length === 0) continue;

    raids.push({ boss, tier, weather, archivePage, category, rawCategory, bossFm, bossCm, adventureEffect, party });
  }
  return raids;
}

function fingerprintDyn(party){
  return party.map(p => {
    const normMove = m => m.trim().toLowerCase().replace(/\s+/g, '');
    return `${p.n.trim().toLowerCase()}|${normMove(p.fast)}|${normMove(p.charge)}`;
  }).sort().join('||');
}

function slugDyn(n){
  return n.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

function splitRoleCountDyn(roleCell){
  const m = roleCell.match(/^(.*?),\s*([\d.]+(?:-[\d.]+)?x)\s*$/i);
  if(m) return { role: m[1].trim(), count: m[2].trim() };
  return { role: roleCell.trim(), count: "" };
}

// ---- Type resolution (for the Jump-to-Type grouping) ----
const typeLookupDyn = {};
POKEMON_TYPES.forEach(p => { typeLookupDyn[p.n.toLowerCase()] = [p.t1, p.t2 || '']; });

function resolveTypeDyn(name){
  const key = name.trim().toLowerCase();
  if(key === 'various') return null;
  if(key === 'mega mewtwo y') return ['Psychic', ''];
  if(TYPE_OVERRIDES[key]) return [TYPE_OVERRIDES[key].t1, TYPE_OVERRIDES[key].t2 || ''];
  if(typeLookupDyn[key]) return typeLookupDyn[key];
  const stripped = key.replace(/^(mega|primal|shadow)\s+/, '').replace(/\s+(mega)$/, '');
  if(TYPE_OVERRIDES[stripped]) return [TYPE_OVERRIDES[stripped].t1, TYPE_OVERRIDES[stripped].t2 || ''];
  if(typeLookupDyn[stripped]) return typeLookupDyn[stripped];
  return null;
}

// ---- Move-based type labeling (charge move elemental type) ----
const moveInfoLookupDyn = {};
MOVE_DB.forEach(m => { moveInfoLookupDyn[m.n.toLowerCase()] = m; });

function resolveMoveTypeDyn(moveName){
  if(!moveName) return null;
  const clean = moveName.trim();
  if(moveInfoLookupDyn[clean.toLowerCase()]) return moveInfoLookupDyn[clean.toLowerCase()].elem;
  const parts = clean.split(/\s*[&/]\s*|\s+or\s+/i).map(p => p.trim()).filter(Boolean);
  for(const part of parts){
    if(moveInfoLookupDyn[part.toLowerCase()]) return moveInfoLookupDyn[part.toLowerCase()].elem;
  }
  if(/^hidden power/i.test(clean)) return null;
  return null;
}

// ---- Pokechespin enum conversion (confirmed conventions) ----
function moveToEnumDyn(moveName){
  let clean = moveName.trim();
  if(!moveInfoLookupDyn[clean.toLowerCase()]){
    const parts = clean.split(/\s*[&/]\s*|\s+or\s+/i).map(p => p.trim()).filter(Boolean);
    for(const part of parts){
      if(moveInfoLookupDyn[part.toLowerCase()]){ clean = part; break; }
    }
  }
  const info = moveInfoLookupDyn[clean.toLowerCase()];
  let enum_ = clean.toUpperCase().split(/\s+/).join('_');
  if(info && info.type === 'Fast') enum_ += '_FAST';
  return enum_;
}

function speciesToEnumDyn(name){
  let n = name.trim();
  const isShadow = /^shadow\s+/i.test(n);
  if(isShadow) n = n.replace(/^shadow\s+/i, '');
  n = n.replace(/Crowned Zacian/i, 'Zacian Crown').replace(/Crowned Zamazenta/i, 'Zamazenta Crown');
  n = n.replace(/-/g, ' ');
  let words = n.split(/\s+/);
  if(words[0].toLowerCase() === 'mega') words = words.slice(1).concat(['Mega']);
  if(words[0].toLowerCase() === 'primal') words = words.slice(1).concat(['Primal']);
  const FORM_WORDS = new Set(['black','white','origin','hero','crown','incarnate','therian','dawn','wings','dusk','mane','resolute','attack','defense','speed']);
  const needsForm = words.some(w => FORM_WORDS.has(w.toLowerCase())) && !words.some(w => ['mega','primal'].includes(w.toLowerCase()));
  let enum_ = words.map(w => w.toUpperCase()).join('_');
  if(needsForm && !enum_.endsWith('_FORM')) enum_ += '_FORM';
  if(isShadow) enum_ += '_SHADOW_FORM';
  return { enum: enum_, isShadow };
}

function raidModeForDyn(category, rawCategory){
  if(category === 'Mega') return 'raid-t4';
  if(category === 'Legendary' || category === 'Legendary AE') return 'raid-t5';
  if(category === 'Mega Legendary & Elite'){
    if(rawCategory === 'Elite') return 'raid-elite';
    return 'raid-mega-leg';
  }
  return 'raid-t5';
}

function buildChespinLinkDyn(sampleRaid, slots){
  const bossFm = sampleRaid.bossFm && sampleRaid.bossFm.toLowerCase() !== 'any' && sampleRaid.bossFm.toLowerCase() !== 'varies'
    ? sampleRaid.bossFm : 'Tackle';
  const bossCm = sampleRaid.bossCm && sampleRaid.bossCm.toLowerCase() !== 'any' && sampleRaid.bossCm.toLowerCase() !== 'varies'
    ? sampleRaid.bossCm : 'Hyper Beam';
  const bossEnum = speciesToEnumDyn(sampleRaid.boss.replace(/-/g, ' ')).enum;
  const raidMode = raidModeForDyn(sampleRaid.category, sampleRaid.rawCategory);

  function parseCountDyn(countStr){
    if(!countStr) return 1;
    const m = countStr.match(/(\d+)(?:-(\d+))?x/i);
    if(!m) return 1;
    return m[2] ? parseInt(m[2], 10) : parseInt(m[1], 10);
  }
  const expandedSlots = [];
  slots.forEach(slot => {
    const copies = parseCountDyn(slot.count);
    for(let c = 0; c < copies; c++){
      if(expandedSlots.length >= 6) return;
      expandedSlots.push(slot);
    }
  });
  const teamSize = String(expandedSlots.length);

  const params = new URLSearchParams();
  params.set('can_dodge', 'false');
  params.set('enraged', 'false');
  params.set('pokemon_team_number', teamSize);
  params.set('relobby_time', '7');
  params.set('teams_number', '1');
  params.set('defender_bonuses', 'extreme,false,false,0');
  params.set('party_power', 'false');
  params.set('energy_resolve_bug', 'false');
  params.set('num_pokemon', teamSize);
  params.set('defender_stats', '50,15,15,15');
  params.set('defender', bossEnum);
  params.set('defender_fast_attack', moveToEnumDyn(bossFm));
  params.set('defender_cinematic_attack', moveToEnumDyn(bossCm));
  params.set('weather', sampleRaid.weather.toUpperCase().split(/\s+/).join('_'));
  params.set('raid_mode', raidMode);
  params.set('adv_effect', sampleRaid.adventureEffect || 'none');

  expandedSlots.forEach((slot, i) => {
    const n = i + 1;
    const { enum: speciesEnum, isShadow } = speciesToEnumDyn(slot.n);
    params.set(`attacker_stats${n}`, '50,15,15,15');
    params.set(`attacker${n}`, speciesEnum);
    params.set(`attacker_bonuses${n}`, `extreme,${isShadow},false,0`);
    params.set(`attacker_fast_attack${n}`, moveToEnumDyn(slot.fast));
    params.set(`attacker_cinematic_attack${n}`, moveToEnumDyn(slot.charge));
  });

  return 'https://pokechespin.net/?' + params.toString();
}

const CHESPIN_BOSSES = new Set([
  'articuno','celesteela','darkrai','kyurem black','necrozma dusk mane','palkia','regigigas',
  'reshiram','solgaleo','tapu koko','terrakion','xerneas','xurkitree','zamazenta hero','zapdos',
  'blacephalon','enamorus incarnate','heatran','latios','necrozma','nihilego','regieleki',
  'tapu bulu','tornadus incarnate','zekrom'

async function fetchAndParseArchive(csvFile, archivePage, category, earlyOffset, partyOffset){
  try{
    const res = await fetch(csvFile);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSVText(text).slice(1);
    return rowsToRaidsDyn(rows, archivePage, category, earlyOffset, partyOffset);
  }catch(e){
    console.error('Failed to load', csvFile, e);
    return [];
  }
}

async function buildPartiesFromCSVs(){
  const [tier4, tier5, tier5ae, tier6] = await Promise.all([
    fetchAndParseArchive('tier4-data.csv', 'tier4-raids.html', 'Mega', 0, 0),
    fetchAndParseArchive('tier5-data.csv', 'tier5-raids.html', 'Legendary', 0, -1),
    fetchAndParseArchive('tier5-ae-data.csv', 'tier5-ae-raids.html', 'Legendary AE', 0, 0),
    fetchAndParseArchive('tier6-data.csv', 'tier6-elite-raids.html', 'Mega Legendary & Elite', 1, 1),
  ]);
  const allRaids = [...tier4, ...tier5, ...tier5ae, ...tier6];

  const groupsByFp = {};
  const groupOrder = [];
  allRaids.forEach(raid => {
    const fp = fingerprintDyn(raid.party);
    if(!groupsByFp[fp]){ groupsByFp[fp] = []; groupOrder.push(fp); }
    groupsByFp[fp].push(raid);
  });

  const cards = [];
  groupOrder.forEach(fp => {
    const raids = groupsByFp[fp];
    const canonical = raids[0];

    let mainDpsSlot = canonical.party.find(p => /main dps/i.test(p.r));
    if(!mainDpsSlot) mainDpsSlot = canonical.party[0];

    const slots = canonical.party.map(p => {
      const { role, count } = splitRoleCountDyn(p.r);
      return { n: p.n, r: role, fast: p.fast, charge: p.charge, count };
    });

    // Type label: derived from charge-move elemental types across every slot
    const types = new Set();
    slots.forEach(s => {
      const t = resolveMoveTypeDyn(s.charge);
      if(t) types.add(t);
    });
    const typeList = [...types];
    let typeLabel;
    if(typeList.length === 0){
      const speciesTypes = resolveTypeDyn(mainDpsSlot.n);
      typeLabel = mainDpsSlot.n.toLowerCase() === 'various' ? 'Varies'
        : (speciesTypes ? (speciesTypes[1] ? `${speciesTypes[0]}/${speciesTypes[1]}` : speciesTypes[0]) : 'Unknown');
      typeLabel = typeLabel.replace(/\b\w/g, c => c.toUpperCase());
    } else if(typeList.length >= 3){
      typeLabel = 'Hybrid';
    } else {
      typeLabel = typeList.join('/');
    }

    const partySlug = [...new Set(canonical.party.map(p => slugDyn(p.n)))].sort().join(',');
    const options = raids.map(r => {
      const href = `${r.archivePage}?weather=${encodeURIComponent(r.weather)}&tier=${r.tier}&party=${encodeURIComponent(partySlug)}#boss-${slugDyn(r.boss)}`;
      const label = `${r.boss} — ${r.category}, ${r.weather.replace(/\b\w/g, c => c.toUpperCase())}, ${r.tier} ⭐`;
      return { href, boss: r.boss, label };
    });

    const card = options.length === 1
      ? { type: typeLabel, raid: { href: options[0].href, boss: options[0].boss }, slots }
      : { type: typeLabel, raidOptions: options, slots };

    // Chespin links - only for the confirmed boss allowlist, generic IVs (no per-submission
    // IV source is fetched dynamically yet - see note in chat about hosting those CSVs too)
    const cardBosses = raids.map(r => r.boss.trim().toLowerCase());
    if(cardBosses.some(b => CHESPIN_BOSSES.has(b))){
      card.chespinLinks = raids.map(raid => ({
        boss: raid.boss,
        link: buildChespinLinkDyn(raid, slots),
      }));
    }

    cards.push(card);
  });

  cards.sort((a, b) => a.type.localeCompare(b.type));
  return cards;
}

function toDbSlug(name){
  let n = name.trim().toLowerCase();
  if (DB_OVERRIDES[n]) return DB_OVERRIDES[n];
  n = n.replace(/^shadow\s+/, "");
  if (DB_OVERRIDES[n]) return DB_OVERRIDES[n];
  const megaMatch = n.match(/^mega\s+(.+)$/);
  if (megaMatch) return `${megaMatch[1].replace(/\s+/g, "-")}-mega`;
  // PokemonDB uses a suffix for regional forms (e.g. "raichu-alolan"), not a prefix
  const regionalMatch = n.match(/^(alolan|galarian|hisuian|paldean)\s+(.+)$/);
  if (regionalMatch) return `${regionalMatch[2].replace(/\s+/g, "-")}-${regionalMatch[1]}`;
  return n.replace(/\s+/g, "-");
}
function displayName(name){
  return name.replace(/\s+Incarnate$/i, "-I").replace(/\s+Therian$/i, "-T");

function chespinIconHtml(p, i){
  if(!p.chespinLinks || !p.chespinLinks.length) return "";
  if(p.chespinLinks.length === 1){
    return `<a class="chespin-link" href="${p.chespinLinks[0].link}" target="_blank" rel="noopener noreferrer" title="Simulate this party on PokéChespin"><img src="${CHESPIN_LOGO}" alt="PokéChespin"></a>`;
  }
  const panelId = `chespin-panel-${p.type.replace(/[^a-z0-9]+/gi,'-')}-${i}`;
  return `
    <div class="nav-dropdown chespin-dropdown">
      <button type="button" class="chespin-link chespin-toggle" onclick="toggleNavDropdown(event, '${panelId}')" title="Simulate this party on PokéChespin">
        <img src="${CHESPIN_LOGO}" alt="PokéChespin">
      </button>
      <div class="nav-dropdown-panel chespin-dropdown-panel" id="${panelId}">
        ${p.chespinLinks.map(o => `<a href="${o.link}" target="_blank" rel="noopener noreferrer" class="nav-dropdown-item">${o.boss}</a>`).join("")}
      </div>
    </div>`;
}

function partyCardHtml(p, i){
  return `
  <div class="party-card" data-pokemon="${p.slots.map(s=>s.n.toLowerCase()).join(' ')}">
    <div class="party-index-row">
      <div class="party-index">${p.type} · Battle Party ${i+1}</div>
      ${chespinIconHtml(p, i)}
      ${partySourceHtml(p, i)}
    </div>
    ${p.slots.map(slotRowHtml).join("")}
  </div>`;
}

let groups = {};
let primaryTypes = [];

function computeGroups(){
  groups = {};
  PARTIES.forEach(p => {
    const primary = p.type.split("/")[0].trim();
    if(!groups[primary]) groups[primary] = [];
    groups[primary].push(p);
  });
  primaryTypes = Object.keys(groups).sort();
}

function buildIndex(){
  const el = document.getElementById("typeIndex");
  el.innerHTML = "";
  primaryTypes.forEach(t => {
    const a = document.createElement("a");
    a.href = `#type-${t.replace(/\s+/g,"-")}`;
    a.textContent = t;
    el.appendChild(a);
  });
}

function buildContent(filterQuery){
  const el = document.getElementById("content");
  let html = "";
  primaryTypes.forEach(t => {
    const parties = groups[t].filter(p =>
      !filterQuery || p.slots.some(s => s.n.toLowerCase().includes(filterQuery))
    );
    if(parties.length === 0) return;
    html += `
    <div class="type-section" id="type-${t.replace(/\s+/g,"-")}">
      <div class="type-header">
        <span class="type-name">${t}</span>
        <span class="type-count">${parties.length} ${parties.length === 1 ? "battle party" : "battle parties"}</span>
      </div>
      <div class="party-grid">${parties.map((p,i) => partyCardHtml(p,i)).join("")}</div>
    </div>`;
  });
  el.innerHTML = html || `<div class="empty">No battle parties match that Pokémon.</div>`;
}

}

function normSpeciesDyn(n){
  let s = n.trim().toLowerCase().replace(/-/g, ' ').replace(/\s+/g, ' ');
  if(s === 'keldeo') s = 'keldeo resolute';
  return s;
}

function parseCountForIvDyn(countStr){
  if(!countStr) return 1;
  const m = countStr.match(/(\d+)(?:-(\d+))?x/i);
  if(!m) return 1;
  return m[2] ? parseInt(m[2], 10) : parseInt(m[1], 10);
}

function expandCardSlotsForIv(card){
  const expanded = [];
  card.slots.forEach(slot => {
    const copies = parseCountForIvDyn(slot.count);
    for(let c = 0; c < copies && expanded.length < 7; c++) expanded.push(slot);
  });
  return expanded;
}

function multisetMatchesDyn(a, b){
  if(a.length !== b.length) return false;
  const sortedA = [...a].sort();
  const sortedB = [...b].sort();
  return sortedA.every((v, i) => v === sortedB[i]);
}

function parseIvSpreadsheet(text, skipRows, numSlots){
  const rows = parseCSVText(text).slice(skipRows);
  const entries = [];
  rows.forEach(row => {
    const boss = (row[0] || '').trim();
    if(!boss) return;
    const slots = [];
    for(let i = 0; i < numSlots; i++){
      const base = 1 + i*5;
      const rawSpecies = (row[base] || '').trim();
      if(!rawSpecies) continue;
      slots.push({
        species: expandAbbrev(rawSpecies),
        atk: (row[base+1]||'').trim(), def: (row[base+2]||'').trim(),
        hp: (row[base+3]||'').trim(), level: (row[base+4]||'').trim(),
      });
    }
    if(slots.length) entries.push({ boss, slots });
  });
  return entries;
}

async function fetchIvSpreadsheet(csvFile, skipRows, numSlots){
  try{
    const res = await fetch(csvFile);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    return parseIvSpreadsheet(text, skipRows, numSlots);
  }catch(e){
    console.error('Failed to load IV spreadsheet', csvFile, e);
    return [];
  }
}

function applyRealIvMatching(cards, ivEntries){
  let matched = 0;
  cards.forEach(card => {
    if(!card.chespinLinks) return;
    const expandedSlots = expandCardSlotsForIv(card);
    const cardSpeciesMultiset = expandedSlots.map(s => normSpeciesDyn(s.n));

    card.chespinLinks.forEach(linkInfo => {
      const bossKey = linkInfo.boss.trim().toLowerCase();
      const candidates = ivEntries.filter(e => e.boss.trim().toLowerCase() === bossKey);
      const match = candidates.find(entry => {
        const entryMultiset = entry.slots.map(s => normSpeciesDyn(s.species));
        return multisetMatchesDyn(cardSpeciesMultiset, entryMultiset);
      });
      if(!match) return;
      matched++;

      const url = new URL(linkInfo.link);
      const realSlotsBySpecies = {};
      match.slots.forEach(s => {
        const key = normSpeciesDyn(s.species);
        if(!realSlotsBySpecies[key]) realSlotsBySpecies[key] = [];
        realSlotsBySpecies[key].push(s);
      });
      expandedSlots.forEach((slot, i) => {
        const n = i + 1;
        const key = normSpeciesDyn(slot.n);
        const pool = realSlotsBySpecies[key];
        if(!pool || !pool.length) return;
        const real = pool.shift();
        url.searchParams.set(`attacker_stats${n}`, `${real.level},${real.atk},${real.def},${real.hp}`);
      });
      linkInfo.link = url.toString();
    });
  });
  return matched;
}

async function initPage(){
  const el = document.getElementById("content");
  el.innerHTML = `<div class="empty">Loading battle parties from the archives…</div>`;
  try{
    PARTIES = await buildPartiesFromCSVs();
    const [sixStarEntries, tier55Entries] = await Promise.all([
      fetchIvSpreadsheet('6_star_raids.csv', 2, 6),
      fetchIvSpreadsheet('5dot5_converted.csv', 1, 7),
    ]);
    const matched = applyRealIvMatching(PARTIES, [...sixStarEntries, ...tier55Entries]);
    console.log('Real IVs matched from spreadsheets:', matched);
  }catch(e){
    console.error("Failed to build battle parties:", e);
    el.innerHTML = `<div class="empty">Couldn't load the raid archives. This page needs to be served over http(s) — opening the file directly (file://) blocks this.</div>`;
    return;
  }
  computeGroups();
  buildIndex();
  buildContent("");
}
initPage();

document.getElementById("pokemonSearch").addEventListener("input", (e) => {
  buildContent(e.target.value.trim().toLowerCase());
});

const themeToggle = document.getElementById("themeToggle");
function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
  try{ localStorage.setItem("raidArchiveTheme", theme); }catch(e){}
}
themeToggle.addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
  applyTheme(current === "dark" ? "light" : "dark");
});
let initialTheme = "light";
try{
  const saved = localStorage.getItem("raidArchiveTheme");
  if(saved){ initialTheme = saved; }
  else if(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches){ initialTheme = "dark"; }
}catch(e){}
applyTheme(initialTheme);

function toggleNavDropdown(e, panelId){
  e.stopPropagation();
  const panel = document.getElementById(panelId);
  if(!panel) return;
  const isOpen = panel.classList.contains("open");
  document.querySelectorAll(".nav-dropdown-panel.open").forEach(p => p.classList.remove("open"));
  if(!isOpen) panel.classList.add("open");
}
document.addEventListener("click", () => {
  document.querySelectorAll(".nav-dropdown-panel.open").forEach(p => p.classList.remove("open"));
});
