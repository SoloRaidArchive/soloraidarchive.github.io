<style>
  :root{
    --bg1: #eaf4ff; --bg2: #fff7e8; --bg: #eaf4ff; --card: #ffffff; --border: #e7edf5;
    --ink: #2d3142; --ink-muted: #6b7280; --ink-dim: #9aa3b2;
    --accent: #3d9dff; --accent-soft: #eaf4ff; --accent-dark: #2b7fd6;
    --normal:#9199A1; --fire:#E2661C; --water:#3E8DE0; --electric:#E0B316;
    --grass:#4E9A3A; --ice:#5AC9C9; --fighting:#A2402A; --poison:#8A3F94;
    --ground:#6B4423; --flying:#8B93E0; --psychic:#E0426E; --bug:#7B9A1E;
    --rock:#B5651D; --ghost:#5B4B8A; --dragon:#5B3FE0; --dark:#4A4238;
    --steel:#7A8A9A; --fairy:#E091C9;
  }
  [data-theme="dark"]{
    --bg1: #10131d; --bg2: #1a1424; --bg: #10131d; --card: #1c2030; --border: #323850;
    --ink: #eef1f7; --ink-muted: #a7afc0; --ink-dim: #767f96;
    --accent: #5aa9ff; --accent-soft: #232840; --accent-dark: #8cc7ff;
  }
  [data-theme="dark"] .slot-icon{ background:#eaeaec; border-color:#3a3f56; }
  [data-theme="dark"] .slot-count{ background:#2a2e42; color: var(--ink-muted); }
  [data-theme="dark"] .index a:hover{ background: var(--accent-soft); }

  .theme-toggle{
    position:fixed; top:16px; right:16px; z-index:20;
    width:42px; height:42px; border-radius:50%;
    background: var(--card); border:2px solid var(--border);
    font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 2px 6px rgba(26,29,41,0.08); transition: transform .15s;
  }
  .theme-toggle:hover{ transform: translateY(-2px); }
  *{ box-sizing:border-box; }
  body{
    margin:0; background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%); color: var(--ink);
    font-family: 'Inter', sans-serif; min-height:100vh;
  }

  .home-link{
    display:inline-flex; align-items:center; gap:5px;
    background: var(--card); border:2px solid var(--border); border-radius:10px;
    padding: 9px 15px; font-weight:600; font-size:13px;
    color: var(--accent); text-decoration:none; box-shadow: 0 2px 6px rgba(26,29,41,0.06);
  }

  header{ padding: 12px 24px 10px; text-align:center; }
  h1{
    font-family:'Manrope', sans-serif; font-weight:700; font-size: 27px;
    margin: 0; color: var(--ink);
  }

  .search-row{ display:flex; justify-content:center; padding: 0 24px; margin: 4px 0 18px; }
  #pokemonSearch{
    width:100%; max-width:360px;
    background: var(--card); border: 1px solid var(--border); color: var(--ink);
    font-size:14px; padding: 11px 16px; border-radius: 10px; outline:none;
    box-shadow: 0 1px 2px rgba(26,29,41,0.04);
  }
  #pokemonSearch:focus{ border-color: var(--accent); }
  #pokemonSearch::placeholder{ color: var(--ink-dim); }

  .layout{
    max-width:1300px; margin: 0 auto; padding: 24px 24px 70px;
    display:flex; gap:32px; align-items:flex-start;
  }
  .top-nav-wrap{
    max-width: 1760px; margin: 70px auto 0; padding: 0 20px;
    display:grid; grid-template-columns: 1fr auto 1fr; align-items:center; gap:16px;
  }
  .top-nav-wrap .home-link{ justify-self:start; grid-column:1; }
  .top-nav-wrap .top-nav-row{ grid-column:2; }
  .top-nav-wrap .nav-spacer{ grid-column:3; }
  @media (max-width:760px){
    .top-nav-wrap{ grid-template-columns: 1fr; justify-items:center; gap:12px; }
    .top-nav-wrap .home-link{ justify-self:center; grid-column:1; }
    .top-nav-wrap .top-nav-row{ grid-column:1; }
    .top-nav-wrap .nav-spacer{ display:none; }
  }
  .mini-nav-row{ display:flex; justify-content:center; margin-top:6px; }
  @media (min-width:761px){
    .mini-nav-row{ justify-content:flex-start; max-width:1760px; margin:6px auto 0; padding:0 20px; }
  }
  .top-nav-label{
    font-weight:800; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em;
    color: var(--ink-dim);
  }
  .nav-dropdown{ position:relative; }
  .nav-dropdown-trigger{
    display:inline-flex; align-items:center; gap:5px;
    background: var(--card); border:2px solid var(--border); border-radius:999px;
    padding: 8px 14px; font-family:'Manrope', sans-serif; font-weight:700; font-size:12.5px;
    color: var(--ink-muted); cursor:pointer;
    transition: transform .12s ease, border-color .12s ease, color .12s ease;
  }
  .nav-dropdown-trigger:hover{ transform: translateY(-2px); border-color: var(--accent); color: var(--accent-dark); }
  .nav-dropdown-trigger.has-current{ background: var(--accent); color:#fff; border-color: var(--accent); }
  .nav-dropdown-panel{
    position:absolute; top:calc(100% + 8px); left:0; transform:none;
    background: var(--card); border:2px solid var(--border); border-radius:14px;
    padding:8px; min-width:230px; box-shadow:0 10px 28px rgba(0,0,0,0.18);
    display:none; flex-direction:column; gap:2px; z-index:30;
  }
  .nav-dropdown-panel.open{ display:flex; }
  .nav-dropdown-item{
    display:block; padding:9px 12px; border-radius:9px;
    font-family:'Inter', sans-serif; font-weight:700; font-size:13px;
    color: var(--ink-muted); text-decoration:none; white-space:nowrap;
  }
  .nav-dropdown-item:hover{ background: var(--bg1); color: var(--accent-dark); }
  .party-source-item{ display:flex !important; align-items:center; gap:8px; white-space:normal; }
  .party-source-item img{ width:20px; height:20px; border-radius:50%; object-fit:contain; background:#fff; flex-shrink:0; }
  .nav-dropdown-item.current{ background: var(--accent); color:#fff; }
  .top-nav-row{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .top-nav-link{
    display:inline-flex; align-items:center; gap:5px;
    background: var(--card); border:2px solid var(--border); border-radius:999px;
    padding: 8px 14px; font-weight:700; font-size:12.5px;
    color: var(--ink-muted); text-decoration:none;
    transition: transform .12s ease, border-color .12s ease, color .12s ease;
  }
  .top-nav-link:hover{ transform: translateY(-2px); border-color: var(--accent); color: var(--accent-dark); }
  .top-nav-link.current{ background: var(--accent); color:#fff; border-color: var(--accent); }
  .index{
    flex: 0 0 200px; position:sticky; top:20px;
    background: var(--card); border:2px solid var(--border); border-radius:16px; padding:16px;
  }
  .index-title{
    font-family:'Manrope', sans-serif; font-weight:700; font-size:11px;
    text-transform:uppercase; letter-spacing:0.05em; color: var(--ink-dim); margin-bottom:8px;
  }
  .index a{
    display:block; font-weight:700; font-size:13px;
    color: var(--ink-muted); text-decoration:none; padding:9px 11px; border-radius:9px; margin-bottom:2px;
    transition: background .12s, color .12s;
  }
  .index a.current{ background: var(--accent); color:#fff; }
  .index a:hover{ background: var(--accent-soft); color: var(--accent-dark); }

  .content{ flex:1; min-width:0; }

  .type-section{ margin-bottom: 40px; }
  .type-header{
    display:flex; align-items:baseline; gap:12px; margin-bottom:16px;
  }
  .type-name{ font-family:'Manrope', sans-serif; font-weight:700; font-size:22px; }
  .type-count{
    font-family:'Inter', sans-serif; font-size:12px; color: var(--ink-dim);
  }

  .party-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:16px; }

  .party-card{
    background: var(--card); border:2px solid var(--border); border-radius:14px;
    padding: 16px 18px; box-shadow: 0 1px 2px rgba(26,29,41,0.04);
    transition: box-shadow .15s, border-color .15s;
  }
  .party-card:hover{ border-color:#d6d3fb; box-shadow: 0 6px 18px rgba(91,79,224,0.08); }
  .party-index-row{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:12px; }
  .chespin-link{ flex-shrink:0; display:flex; align-items:center; transition: transform .12s ease; }
  button.chespin-toggle{ background:none; border:none; padding:0; cursor:pointer; }
  .chespin-dropdown-panel{ min-width:180px; }
  .chespin-link:hover{ transform: scale(1.15); }
  .chespin-link img{ width:20px; height:20px; object-fit:contain; border-radius:4px; }
  .party-index{
    font-family:'Inter', sans-serif; font-size:10.5px; color: var(--ink-dim);
  }
  .party-source-link{
    display:flex; align-items:center; gap:5px; flex-shrink:0; text-decoration:none;
    background: var(--accent-soft); border:1px solid var(--border); border-radius:999px;
    padding: 3px 10px 3px 4px; font-family:'Inter', sans-serif; font-size:10px; font-weight:700;
    color: var(--accent-dark); white-space:nowrap;
  }
  .party-source-link:hover{ border-color: var(--accent); }
  .party-source-link img{ width:18px; height:18px; border-radius:50%; object-fit:contain; background:#fff; }
  .slot-row{
    display:flex; align-items:center; gap:11px; padding:8px 0;
    border-bottom: 1px solid var(--border);
  }
  .slot-row:last-child{ border-bottom:none; }
  .slot-icon{
    width:38px; height:38px; border-radius:9px; flex-shrink:0;
    background:#f0f0f2; border:2px solid var(--border);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .slot-icon img{ width:100%; height:100%; object-fit:contain; padding:1px; }
  .slot-icon .fallback{ font-family:'Manrope', sans-serif; font-weight:700; color: var(--ink-dim); font-size:14px; }
  .slot-info{ flex:1; min-width:0; }
  .slot-name{ font-weight:600; font-size:14px; color: var(--ink); }
  .slot-role{
    font-family:'Inter', sans-serif; font-size:10.5px; color: var(--accent-dark);
    margin-top:1px;
  }
  .slot-moves{ display:flex; gap:5px; margin-top:5px; flex-wrap:wrap; }
  .move-pill{
    font-family:'Inter', sans-serif; font-size:10px; font-weight:600;
    padding:2px 8px; border-radius:5px; color:#fff;
  }
  .slot-count{
    font-family:'Inter', sans-serif; font-size:11.5px; color: var(--ink-muted);
    background:#f0f0f2; padding:3px 9px; border-radius:6px; flex-shrink:0;
  }

  .empty{ text-align:center; color: var(--ink-dim); padding:60px 20px; font-family:'Inter', sans-serif; }

  @media (max-width:900px){
    .layout{ flex-direction:column; }
    .index{
      position:static; width:100%;
      display:flex; flex-wrap:wrap; gap:4px;
    }
  }
</style>

function toDbSlug(name){
  let n = name.trim().toLowerCase();
  if (DB_OVERRIDES[n]) return DB_OVERRIDES[n];
  n = n.replace(/^shadow\s+/, "");
  if (DB_OVERRIDES[n]) return DB_OVERRIDES[n];
  const megaMatch = n.match(/^mega\s+(.+)$/);
  if (megaMatch) return `${megaMatch[1].replace(/\s+/g, "-")}-mega`;
  // PokemonDB uses a suffix for regional forms (e.g. "raichu-alolan"), not a prefix
  const regionalMatch = n.match(/^(alolan|galarian|hisuian|paldean)\s+(.+)$/);
  if (regionalMatch) return `${regionalMatch[2].replace(/\s+/g, "-")}-${regionalMatch[1]}`;
  return n.replace(/\s+/g, "-");
}
function displayName(name){
  return name.replace(/\s+Incarnate$/i, "-I").replace(/\s+Therian$/i, "-T");
}

function spriteUrl(name){
  const key = name.trim().toLowerCase();
  if (GOHUB_OVERRIDES[key]) return GOHUB_OVERRIDES[key];
  if (ANI_URL_OVERRIDES[key]) return ANI_URL_OVERRIDES[key];
  if (key.startsWith("shadow ")){
    const base = key.replace(/^shadow\s+/, "");
    if (DEX_MAP[base]) return `https://db.pokemongohub.net/images/official/full/${DEX_MAP[base]}_shadow.webp`;

  // this repo drops the trailing "n" on Alolan forms (e.g. "raichu-alola", not "raichu-alolan")

  return `https://raw.githubusercontent.com/mgrann03/pokemon-resources/main/graphics/ani/${slug}.gif`;

function getMoveType(move){
  if(!move) return null;
  const key = move.trim().toLowerCase();
  if(key === "any" || key === "varies" || key === "") return null;
  return MOVE_TYPES[key] || null;
}
function moveChip(move){
  const type = getMoveType(move);
  const color = type ? TYPE_COLORS[type] : "#9498a8";
  return `<span class="move-pill" style="background:${color};">${move}</span>`;
}

function roleAbbrev(r){
  return r.split(",").map(s => s.trim())
    .map(s => ({"Main DPS":"Main","Support DPS":"Support","Catch Tank":"Catch Tank","Executor":"Executor"}[s] || s))
    .join(" · ");
}

function slotRowHtml(s){
  return `
  <div class="slot-row">
    <div class="slot-icon">
      <img src="${spriteUrl(s.n)}" alt="${s.n}" loading="lazy"
           onerror="this.parentElement.innerHTML='<div class=&quot;fallback&quot;>${s.n[0]}</div>'">
    </div>
    <div class="slot-info">
      <div class="slot-name">${displayName(s.n)}</div>
      <div class="slot-role">${roleAbbrev(s.r)}</div>
      <div class="slot-moves">${moveChip(s.fast)}${moveChip(s.charge)}</div>
    </div>
    <div class="slot-count">${s.count}</div>
  </div>`;
}

function partySourceHtml(p, i){
  if(p.raid){
    return `<a class="party-source-link" href="${p.raid.href}" title="Jump to the recorded raid this battle party was used in">
      <img src="${spriteUrl(p.raid.boss)}" alt="" loading="lazy" onerror="this.style.display='none'">View raid
    </a>`;
  }
  if(p.raidOptions && p.raidOptions.length){
    const panelId = `src-panel-${p.type.replace(/[^a-z0-9]+/gi,'-')}-${i}`;
    return `
    <div class="nav-dropdown party-source-dropdown">
      <button type="button" class="party-source-link party-source-toggle" onclick="toggleNavDropdown(event, '${panelId}')">
        <img src="${spriteUrl(p.raidOptions[0].boss)}" alt="" loading="lazy" onerror="this.style.display='none'">${p.raidOptions.length} raids
      </button>
      <div class="nav-dropdown-panel" id="${panelId}">
        ${p.raidOptions.map(o => `<a href="${o.href}" class="nav-dropdown-item party-source-item"><img src="${spriteUrl(o.boss)}" alt="" loading="lazy" onerror="this.style.display='none'">${o.label}</a>`).join("")}
      </div>
    </div>`;
  }
  return "";
}

  return `
    <div class="nav-dropdown chespin-dropdown">
      <button type="button" class="chespin-link chespin-toggle" onclick="toggleNavDropdown(event, '${panelId}')" title="Simulate this party on PokéChespin">
        <img src="${CHESPIN_LOGO}" alt="PokéChespin">
      </button>
      <div class="nav-dropdown-panel chespin-dropdown-panel" id="${panelId}">
        ${p.chespinLinks.map(o => `<a href="${o.link}" target="_blank" rel="noopener noreferrer" class="nav-dropdown-item">${o.boss}</a>`).join("")}
      </div>
    </div>`;
}

function partyCardHtml(p, i){
  return `
  <div class="party-card" data-pokemon="${p.slots.map(s=>s.n.toLowerCase()).join(' ')}">
    <div class="party-index-row">
      <div class="party-index">${p.type} · Battle Party ${i+1}</div>
      ${chespinIconHtml(p, i)}
      ${partySourceHtml(p, i)}
    </div>
    ${p.slots.map(slotRowHtml).join("")}
  </div>`;
}

const groups = {};
PARTIES.forEach(p => {
  const primary = p.type.split("/")[0].trim();
  if(!groups[primary]) groups[primary] = [];
  groups[primary].push(p);
});
const primaryTypes = Object.keys(groups).sort();

function buildIndex(){
  const el = document.getElementById("typeIndex");
  primaryTypes.forEach(t => {
    const a = document.createElement("a");
    a.href = `#type-${t.replace(/\s+/g,"-")}`;
    a.textContent = t;
    el.appendChild(a);
  });
}

function buildContent(filterQuery){
  const el = document.getElementById("content");
  let html = "";
  primaryTypes.forEach(t => {
    const parties = groups[t].filter(p =>
      !filterQuery || p.slots.some(s => s.n.toLowerCase().includes(filterQuery))
    );
    if(parties.length === 0) return;
    html += `
    <div class="type-section" id="type-${t.replace(/\s+/g,"-")}">
      <div class="type-header">
        <span class="type-name">${t}</span>
        <span class="type-count">${parties.length} ${parties.length === 1 ? "battle party" : "battle parties"}</span>
      </div>
      <div class="party-grid">${parties.map((p,i) => partyCardHtml(p,i)).join("")}</div>
    </div>`;
  });
  el.innerHTML = html || `<div class="empty">No battle parties match that Pokémon.</div>`;
}

buildIndex();
buildContent("");
document.getElementById("pokemonSearch").addEventListener("input", (e) => {
  buildContent(e.target.value.trim().toLowerCase());
});

const themeToggle = document.getElementById("themeToggle");
function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
  try{ localStorage.setItem("raidArchiveTheme", theme); }catch(e){}
}
themeToggle.addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
  applyTheme(current === "dark" ? "light" : "dark");
});
let initialTheme = "light";
try{
  const saved = localStorage.getItem("raidArchiveTheme");
  if(saved){ initialTheme = saved; }
  else if(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches){ initialTheme = "dark"; }
}catch(e){}
applyTheme(initialTheme);

function toggleNavDropdown(e, panelId){
  e.stopPropagation();
  const panel = document.getElementById(panelId);
  if(!panel) return;
  const isOpen = panel.classList.contains("open");
  document.querySelectorAll(".nav-dropdown-panel.open").forEach(p => p.classList.remove("open"));
  if(!isOpen) panel.classList.add("open");
}
document.addEventListener("click", () => {
  document.querySelectorAll(".nav-dropdown-panel.open").forEach(p => p.classList.remove("open"));
});
</script>

</body>
</html>
