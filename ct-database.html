function toDbSlug(name){
  let n = name.trim().toLowerCase();
  if (DB_OVERRIDES[n]) return DB_OVERRIDES[n];
  n = n.replace(/^shadow\s+/, ""); // fall back to base species if no shadow-specific sprite exists
  if (DB_OVERRIDES[n]) return DB_OVERRIDES[n];
  const megaMatch = n.match(/^mega\s+(.+)$/);
  if (megaMatch) return `${megaMatch[1].replace(/\s+/g, "-")}-mega`;
  const regionalMatch = n.match(/^(alolan|galarian|hisuian|paldean)\s+(.+)$/);
  if (regionalMatch) return `${regionalMatch[2].replace(/\s+/g, "-")}-${regionalMatch[1]}`;
  return n.replace(/\s+/g, "-");
}

const ANI_OVERRIDES = {

  "thundurus i": "thundurus-incarnate", "thundurus t": "thundurus-therian",

// A few Origin formes aren't in the animated "ani" set at all - they live as static
// PNGs in a differently-named directory with no per-Pokemon slug pattern to guess from.
const ANI_URL_OVERRIDES = {
  "palkia origin": "https://raw.githubusercontent.com/mgrann03/pokemon-resources/main/graphics/pogo-256/palkia-origin.png",
  "dialga origin": "https://raw.githubusercontent.com/mgrann03/pokemon-resources/main/graphics/pogo-256/dialga-origin.png",
};
function spriteUrl(name){
  const key = name.trim().toLowerCase();
  if (GOHUB_OVERRIDES[key]) return GOHUB_OVERRIDES[key];
  if (ANI_URL_OVERRIDES[key]) return ANI_URL_OVERRIDES[key];
  if (key.startsWith("shadow ")){
    const base = key.replace(/^shadow\s+/, "");
    if (DEX_MAP[base]) return `https://db.pokemongohub.net/images/official/full/${DEX_MAP[base]}_shadow.webp`;
  }
  // this repo drops the trailing "n" on Alolan forms (e.g. "raichu-alola", not "raichu-alolan")
  const slug = (ANI_OVERRIDES[key] || ANI_OVERRIDES[key.replace(/^shadow\s+/, "")] || toDbSlug(name)).replace(/-alolan$/, "-alola");
  return `https://raw.githubusercontent.com/mgrann03/pokemon-resources/main/graphics/ani/${slug}.gif`;
}
// ============ LIVE CSV LOADING ============
// Update the database by replacing ct-database.csv in the repo - no HTML editing needed.
// This is the same pattern the tier4/5/5ae/6 raid archives already use for their own data.
let SUBMISSIONS = [];
const CSV_URL = "ct-database.csv";

function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ","){ row.push(field); field = ""; }
      else if(c === "\r"){ /* skip, handled by \n */ }
      else if(c === "\n"){ row.push(field); rows.push(row); row = []; field = ""; }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

// maps our internal field names to the exact column headers Google Forms exports -
// looked up by header name (not position), so column reordering in the sheet is safe,
// and .trim() handles the stray trailing space Google put on "Boss Moveset "
function rowsToSubmissions(rows){
  if(rows.length < 2) return [];
  const header = rows[0].map(h => h.trim());
  const headerLower = header.map(h => h.toLowerCase());
  const idx = name => headerLower.indexOf(name.toLowerCase());
  const col = {
    pokemon: idx("Pokemon"), level: idx("Level"), ivs: idx("IVs"),
    playerMoveset: idx("Player Moveset"), zacianBlade: idx("Zacian Blade boost"),
    boss: idx("Boss"), weather: idx("Weather"), bossMoveset: idx("Boss Moveset"),
    shieldAE: idx("Zamazenta Shield Boost"), dodges: idx("Dodges"), timingMods: idx("Timing Modifiers"),
    chargeCasts: idx("# of Charge moves cast"), fmsTanked: idx("Boss FM Tanked"),
    mainDPS: idx("Main DPS"), trailingDPS: idx("Trailing DPS"), ctDPS: idx("CT DPS"), risky: idx("Risk"),
  };
  return rows.slice(1)
    .filter(r => r.length > 1 && r[col.pokemon] && r[col.pokemon].trim())
    .map(r => ({
      pokemon: (r[col.pokemon] || "").trim(), level: (r[col.level] || "").trim(), ivs: (r[col.ivs] || "").trim(),
      playerMoveset: (r[col.playerMoveset] || "").trim(), zacianBlade: (r[col.zacianBlade] || "").trim(),
      boss: (r[col.boss] || "").trim(), weather: (r[col.weather] || "").trim(), bossMoveset: (r[col.bossMoveset] || "").trim(),
      shieldAE: (r[col.shieldAE] || "").trim(), dodges: (r[col.dodges] || "").trim(), timingMods: (r[col.timingMods] || "").trim(),
      chargeCasts: (r[col.chargeCasts] || "").trim(), fmsTanked: (r[col.fmsTanked] || "").trim(),
      mainDPS: (r[col.mainDPS] || "").trim(), trailingDPS: (r[col.trailingDPS] || "").trim(),
      ctDPS: (r[col.ctDPS] || "").trim(), risky: (r[col.risky] || "").trim(),
    }));
}

async function loadSubmissionsFromCSV(){
  try{
    const res = await fetch(CSV_URL);
    if(!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    SUBMISSIONS = rowsToSubmissions(parseCSV(text));
    render();
  }catch(e){
    console.error("Failed to load CT database:", e);
    grid.innerHTML = `<tr><td colspan="8"><div class="empty">Couldn't load submission data from ${CSV_URL}. This page needs to be served over http(s) — opening the file directly (file://) blocks this. Check the live site, and make sure ${CSV_URL} exists in the repo root.</div></td></tr>`;
    countEl.textContent = "";
  }
}

function subRowHtml(s){
  const [pFast, pCharge] = s.playerMoveset.split(" / ");
  const [bFast, bCharge] = s.bossMoveset.split(" / ");
  return `
  <tr class="sub-row">
    <td>
      <div class="sub-mon">
        <div class="sub-icon"><img src="${spriteUrl(s.pokemon)}" alt="${s.pokemon}" loading="lazy" onerror="this.style.display='none'"></div>
        <div>
          <div class="sub-mon-name">${s.pokemon}</div>
          <div class="sub-moveset"><span class="fm">${pFast}</span><br>${pCharge}</div>
        </div>
      </div>
    </td>
    <td><div class="sub-details">Lv ${s.level}<br>IVs ${s.ivs}</div></td>
    <td><div class="sub-details">${s.weather}</div></td>
    <td>
      <div class="sub-tags">
        ${s.zacianBlade === "Yes" ? `<span class="sub-tag">⚔️ Blade Boost</span>` : ""}
        ${s.shieldAE === "Yes" ? `<span class="sub-tag">🛡️ Shield Boost</span>` : ""}
        ${s.dodges !== "None" ? `<span class="sub-tag">Dodge: ${s.dodges}</span>` : ""}
        ${s.timingMods !== "None" ? `<span class="sub-tag">${s.timingMods}</span>` : ""}
        ${s.risky === "Yes" ? `<span class="sub-tag risky">⚠️ Risky</span>` : ""}
      </div>
    </td>
    <td class="sub-dps-cell"><span class="sub-dps-val">${s.mainDPS}</span></td>
    <td class="sub-dps-cell"><span class="sub-dps-val">${s.trailingDPS}</span></td>
    <td class="sub-dps-cell highlight"><span class="sub-dps-val">${s.ctDPS}</span></td>
    <td>
      <div class="sub-mon col-boss">
        <div class="sub-icon"><img src="${spriteUrl(s.boss)}" alt="${s.boss}" loading="lazy" onerror="this.style.display='none'"></div>
        <div>
          <div class="sub-mon-name">${s.boss}</div>
          <div class="sub-moveset"><span class="fm">${bFast}</span><br>${bCharge}</div>
        </div>
      </div>
    </td>
  </tr>`;
}

const grid = document.getElementById("grid");
const countEl = document.getElementById("count");
const searchInput = document.getElementById("searchInput");
const sortSelect = document.getElementById("sortSelect");

function render(){
  const q = searchInput.value.trim().toLowerCase();
  let list = SUBMISSIONS.filter(s => !q || s.pokemon.toLowerCase().includes(q) || s.boss.toLowerCase().includes(q));

  const sort = sortSelect.value;
  if(sort === "ctdps") list.sort((a,b) => parseFloat(b.ctDPS) - parseFloat(a.ctDPS));
  else if(sort === "maindps") list.sort((a,b) => parseFloat(b.mainDPS) - parseFloat(a.mainDPS));
  else if(sort === "boss") list.sort((a,b) => a.boss.localeCompare(b.boss));

  countEl.textContent = `${list.length} submitted test interaction${list.length !== 1 ? "s" : ""}`;
  grid.innerHTML = list.length
    ? list.map(subRowHtml).join("")
    : `<tr><td colspan="8"><div class="empty">No submissions match your search yet.</div></td></tr>`;
}

searchInput.addEventListener("input", render);
sortSelect.addEventListener("change", render);
loadSubmissionsFromCSV();

const themeToggle = document.getElementById("themeToggle");
function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
  try{ localStorage.setItem("raidArchiveTheme", theme); }catch(e){}
}
themeToggle.addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
  applyTheme(current === "dark" ? "light" : "dark");
});
let initialTheme = "light";
try{
  const saved = localStorage.getItem("raidArchiveTheme");
  if(saved){ initialTheme = saved; }
  else if(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches){ initialTheme = "dark"; }
}catch(e){}
applyTheme(initialTheme);

function toggleNavDropdown(e, panelId){
  e.stopPropagation();
  const panel = document.getElementById(panelId);
  if(!panel) return;
  const isOpen = panel.classList.contains("open");
  document.querySelectorAll(".nav-dropdown-panel.open").forEach(p => p.classList.remove("open"));
  if(!isOpen) panel.classList.add("open");
}
document.addEventListener("click", () => {
  document.querySelectorAll(".nav-dropdown-panel.open").forEach(p => p.classList.remove("open"));
});
</script>
